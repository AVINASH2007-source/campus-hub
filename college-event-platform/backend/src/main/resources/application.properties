# ============================================================
# College Events Platform — Application Configuration
# ============================================================

spring.application.name=college-events-platform

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/college_events?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Avi2007k@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=YourSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ── Mail (SMTP) ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ── Pagination Defaults ───────────────────────────────────────
app.pagination.default-page=0
app.pagination.default-size=12

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Logging ──────────────────────────────────────────────────
logging.level.com.college.events=INFO
logging.level.org.springframework.security=WARN
